version: '3.8'

services:
  app:
    build: .
    container_name: taskmanager-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=super-secret-change-me
      - DB_PATH=/app/data/taskmanager.db
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    networks:
      - taskmanager-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - taskmanager-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - taskmanager-net
    restart: unless-stopped

volumes:
  app-data:
  grafana-data:

networks:
  taskmanager-net:
    driver: bridge