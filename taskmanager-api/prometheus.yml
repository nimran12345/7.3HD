global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'taskmanager-prod'
    static_configs:
      - targets: ['taskmanager-prod:3000']
    metrics_path: '/metrics'

  - job_name: 'taskmanager-staging'
    static_configs:
      - targets: ['taskmanager-staging:3000']
    metrics_path: '/metrics'